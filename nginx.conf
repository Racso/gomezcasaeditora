server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Images are cache-busted by renaming, so they can be cached long-term.
    location ~* \.(?:jpg|jpeg|png|webp|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # CSS/JS are not fingerprinted: always revalidate so style/script
    # changes show up without a hard refresh (304 when unchanged).
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # HTML must always be revalidated, otherwise a stale page can keep
    # pointing at old asset names even after they change.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

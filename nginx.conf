server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    etag on;

    # Images: store the bytes but revalidate via ETag. A 304 keeps repeat
    # loads cheap; replacing a file (same name) changes its ETag and the
    # browser refetches automatically — no renaming needed.
    location ~* \.(?:jpg|jpeg|png|webp|gif|ico|svg|woff2)$ {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS are not fingerprinted: always revalidate so style/script
    # changes show up without a hard refresh (304 when unchanged).
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # HTML must always be revalidated, otherwise a stale page can keep
    # pointing at old asset names even after they change.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
